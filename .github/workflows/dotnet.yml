name: .NET CI

on:
  push:
    branches-ignore:
      - 'dependabot/**'
      - 'gh-pages'
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - 'main'

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Setup GitVersion
      uses: gittools/actions/gitversion/setup@v4
      with:
        versionSpec: '6.4.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Solution
      run: |
        echo "Version: ${{ steps.gitversion.outputs.fullSemVer }}"
        echo "Assembly Version: ${{ steps.gitversion.outputs.assemblySemFileVer }}"
        dotnet build --configuration Debug --no-restore

    - name: Run Tests
      run: dotnet test --configuration Debug --no-build --verbosity normal